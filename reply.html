<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="menu-btn" onclick="toggleUsers()">Conversations</button>

<div class="page-shell admin-page">
  <div class="admin-container">
    <aside class="users-panel">
      <div class="users-panel-header">
        <p class="eyebrow">Workspace</p>
        <h1>Inbox</h1>
        <p class="panel-copy">Open a chat from the list and reply without leaving the thread.</p>
      </div>
      <div class="users" id="userList"></div>
    </aside>

    <div class="chat">
      <div class="chat-header">
        <div class="chat-header-main">
          <div class="header-avatar admin-avatar">A</div>
          <div>
            <p class="header-kicker">Admin console</p>
            <h2 id="replyTitle">Reply panel</h2>
          </div>
        </div>
        <div class="header-status" id="replyStatus">
          <span class="status-dot"></span>
          Select a chat
        </div>
      </div>

      <div id="messages" aria-live="polite"></div>

      <div class="quick-replies" aria-label="Quick replies">
        <button type="button" class="quick-reply-btn" data-reply="Hello 👋 
We noticed your freelancing account doesn’t have enough reviews yet to secure jobs.
Would you like help landing your first job and earning your first review?" onclick="(function(btn){const input=document.getElementById('messageInput');if(!input){return;}const text=btn.dataset.reply;input.value=input.value?input.value+(input.value.trim()?' ':'')+text:text;input.focus();input.dispatchEvent(new Event('input',{bubbles:true}));})(this)">Hello 👋</button>
        
        <button type="button" class="quick-reply-btn" data-reply="Thank you for your trust. 
Please go to the link below, complete the steps, and paste your details here afterward: 
https://sociofie.netlify.app/pages/receipt" onclick="(function(btn){const input=document.getElementById('messageInput');if(!input){return;}const text=btn.dataset.reply;input.value=input.value?input.value+(input.value.trim()?' ':'')+text:text;input.focus();input.dispatchEvent(new Event('input',{bubbles:true}));})(this)">Fill in form</button>

        <button type="button" class="quick-reply-btn" data-reply="You can check out our website to learn more about us: https://sociofie.netlify.app/" onclick="(function(btn){const input=document.getElementById('messageInput');if(!input){return;}const text=btn.dataset.reply;input.value=input.value?input.value+(input.value.trim()?' ':'')+text:text;input.focus();input.dispatchEvent(new Event('input',{bubbles:true}));})(this)">Steps+web</button>
        
        <button type="button" class="quick-reply-btn" data-reply="Thanks for your time! Have a wonderful day 😊" onclick="(function(btn){const input=document.getElementById('messageInput');if(!input){return;}const text=btn.dataset.reply;input.value=input.value?input.value+(input.value.trim()?' ':'')+text:text;input.focus();input.dispatchEvent(new Event('input',{bubbles:true}));})(this)">Thank you.</button>
        <button type="button" class="quick-reply-btn" data-reply="Please hold on for a moment! We are processing your request. Thank you for your patience." onclick="(function(btn){const input=document.getElementById('messageInput');if(!input){return;}const text=btn.dataset.reply;input.value=input.value?input.value+(input.value.trim()?' ':'')+text:text;input.focus();input.dispatchEvent(new Event('input',{bubbles:true}));})(this)">Please wait.</button>

      </div>

      <div class="input-area">
        <input id="messageInput" placeholder="Select a chat to reply..." disabled />
        <button id="sendButton" onclick="sendMessage()" disabled>Send</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="reply.js"></script>
</body>
</html>
